name: CI/CD Hospital

# 1. Se ejecuta cuando se hace un push o una pull request
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # Permisos necesarios para publicar el reporte de tests y el badge
    permissions:
      contents: write
      checks: write 
      pull-requests: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21' 
          distribution: 'temurin'
          cache: maven

      # 2. Dar permisos de escritura/ejecución con chmod
      - name: Dar permisos de ejecución a Maven Wrapper
        run: chmod +x mvnw

      # 3. Compilar el proyecto
      - name: Compilar el proyecto
        run: ./mvnw compile --no-transfer-progress

      # 4. Ejecutar los tests de integración
      - name: Ejecutar pruebas y generar Jacoco
        run: ./mvnw verify --no-transfer-progress

      # 5. Generar un informe de resultados de los tests
      - name: Reporte de Tests (GitHub Test Reporter)
        uses: dorny/test-reporter@v1
        if: always() # Queremos el reporte incluso si algún test falla
        with:
          name: Resultados de Pruebas JUnit
          path: target/surefire-reports/*.xml, target/failsafe-reports/*.xml
          reporter: java-junit

      # 6. Generar el badge de cobertura con Jacoco
      - name: Generar Badge de Cobertura Jacoco
        id: jacoco
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: target/site/jacoco/jacoco.csv
          generate-branches-badge: true

      # 7. Subir el badge generado al propio repositorio para poder mostrarlo
      - name: Guardar Badge de Jacoco en el repositorio
        if: github.event_name == 'push' # Solo hace commit si es un push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/badges/jacoco.svg
          git commit -m "Autogenerar badge de cobertura Jacoco" || echo "No hay cambios en la cobertura"
          git push